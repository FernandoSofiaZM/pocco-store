backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "productos"
    label: "Productos"
    folder: "productos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "nombre", widget: "string" }
      - { label: "Precio", name: "precio", widget: "number" }
      - { label: "Categoría", name: "categoria", widget: "select", options: ["cadenas","pulseras","jueguitos"] }
      - { label: "Imagen", name: "imagen", widget: "image" }
      - { label: "Estado", name: "estado", widget: "select", options: ["Disponible","Agotado"] }
